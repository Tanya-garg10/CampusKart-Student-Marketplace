<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cartGrad" x1="40" y1="50" x2="140" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bgGrad)"/>

  <!-- Subtle shine overlay -->
  <rect width="180" height="90" rx="40" fill="white" fill-opacity="0.08"/>

  <!-- Shopping cart handle/bar -->
  <path d="M38 48 L52 48 L68 118 L132 118 L148 70 L62 70" 
        stroke="url(#cartGrad)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Cart body -->
  <path d="M62 70 L132 70 L122 110 L72 110 Z" 
        fill="url(#cartGrad)" fill-opacity="0.25"/>

  <!-- Cart wheels -->
  <circle cx="78" cy="132" r="10" fill="url(#cartGrad)"/>
  <circle cx="122" cy="132" r="10" fill="url(#cartGrad)"/>

  <!-- "K" letter badge (for Kart) -->
  <rect x="100" y="34" width="46" height="46" rx="13" fill="#f59e0b"/>
  <text x="123" y="66" font-family="Arial, sans-serif" font-size="28" font-weight="900" 
        fill="white" text-anchor="middle">K</text>
</svg>
